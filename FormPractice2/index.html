<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
  <title>Document</title>
</head>
<body>
<form action="" id="formaddbook">
        <fieldset>
          <legend>Información del libro</legend>
          
          <div>
            <label for="name">Nombre: </label>
            <input type="text" id="name" name="name" required>
          </div>
          
          <div>
            <label for="author">Autor: </label>
            <input type="text" id="author" name="author" required>
          </div>
          
          <div>
            <label for="pages">Páginas: </label>
            <input type="number" id="pages" name="pages" min="1" required>
          </div>

           <div>
              <input type="checkbox" id="isRead" name="isRead">
              <label for="isRead">¿Leído?</label>
           
          </div>

        </fieldset>
        
        <div>
          <button type="submit" id="btn-submit">Enviar</button>
        </div>
      </form>
  
</body>
</html>
